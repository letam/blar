<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>blar</title>
<style>
/* ── shared foundation tokens (pasted, not imported) ── */
:root{
  --font: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", monospace;
  --bg:#0a0a0b; --panel:#141416; --line:#24242a;
  --fg:#e6e6e6; --dim:#6f6f78; --faint:#3a3a42;
  --acc:#3ddc84; --acc-dim:#1f6f47; --warn:#ff5c5c;
  --t-xl:2.25rem; --t-l:1.25rem; --t-m:1rem; --t-s:0.8125rem;
  --s1:4px; --s2:8px; --s3:16px; --s4:24px; --s5:48px;
  --radius:8px; --maxw:42rem;
}
*{ box-sizing:border-box; }
body{
  margin:0; background:var(--bg); color:var(--fg);
  font-family:var(--font); font-size:var(--t-m);
  text-transform:lowercase; line-height:1.5; letter-spacing:-0.01em;
  display:grid; place-items:start center; min-height:100dvh;
  padding:var(--s5) var(--s3);
}
main{ width:100%; max-width:var(--maxw); }
button{
  font:inherit; text-transform:lowercase; cursor:pointer;
  background:var(--panel); color:var(--fg);
  border:1px solid var(--line); border-radius:var(--radius);
  padding:var(--s2) var(--s3); transition:border-color .12s, color .12s;
}
button:hover{ border-color:var(--acc-dim); }
button:active{ transform:translateY(1px); }
button:disabled{ opacity:.6; cursor:default; }
.dim{ color:var(--dim); }

/* ── blar ── */
.bar{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:var(--s3); }
.mark{ font-size:var(--t-l); }
.setup{ margin-bottom:var(--s3); }
#tok{ width:100%; background:var(--panel); color:var(--fg); border:1px solid var(--acc-dim);
      border-radius:var(--radius); padding:var(--s3); font:inherit; }
textarea#ed{ width:100%; min-height:52vh; resize:vertical; background:var(--panel); color:var(--fg);
  border:1px solid var(--line); border-radius:var(--radius); padding:var(--s3); font:inherit; line-height:1.65; }
textarea#ed::placeholder{ color:var(--faint); }
.row{ display:flex; justify-content:space-between; align-items:center; gap:var(--s3); margin-top:var(--s3); }
#pub{ color:var(--acc); border-color:var(--acc-dim); white-space:nowrap; }
.toast{ min-height:1.2em; margin-top:var(--s3); font-size:var(--t-s); opacity:0; transition:opacity .2s; }
.toast.show{ opacity:1; }
.toast.ok{ color:var(--acc); } .toast.warn{ color:var(--warn); }
</style>
</head>
<body>
<main>
  <header class="bar"><span class="mark">blar</span><span class="dim">neoselfy</span></header>
  <div id="setup" class="setup" hidden>
    <input id="tok" type="password" autocomplete="off"
      placeholder="paste your github token once. it stays on this device. blar has no server and never sees it.">
  </div>
  <textarea id="ed" placeholder="however many words. doesn't matter if they're good. they go live the second you hit publish. there is no draft. there is no save. write."></textarea>
  <div class="row">
    <span id="wc" class="dim">0 words — ship it anyway</span>
    <button id="pub">publish → it goes live</button>
  </div>
  <p id="toast" class="toast" aria-live="polite"></p>
</main>
<script type="module">
const KEY  = "blar";
const REPO = "neoselfy/blar-posts"; // owner/repo for your posts. must exist, with a posts/ folder. edit this.
const $ = s => document.querySelector(s);

function load(){ try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch { return {}; } }
const save = s => localStorage.setItem(KEY, JSON.stringify(s));
const store = load();

const ed = $("#ed"), wc = $("#wc"), pub = $("#pub"), toastEl = $("#toast"),
      setup = $("#setup"), tok = $("#tok");

// first run only: ask for the token once, then never again
if (!store.token) setup.hidden = false;
tok.addEventListener("change", () => {
  const t = tok.value.trim();
  if (t){ store.token = t; save(store); setup.hidden = true; ed.focus(); }
});

const words  = s => (s.trim().match(/\S+/g) || []).length;
const render = () => { wc.textContent = `${words(ed.value)} words — ship it anyway`; }; // encourages, never blocks
ed.addEventListener("input", render);

const keyOf = d => { const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; };
const b64 = str => btoa(unescape(encodeURIComponent(str))); // utf-8 safe base64

let toastTimer;
function toast(msg, kind){
  toastEl.textContent = msg; toastEl.className = "toast show " + (kind || "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => (toastEl.className = "toast"), 5000);
}

function putFile(path, content, message){
  return fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    method: "PUT",
    headers: {
      "Authorization": `Bearer ${store.token}`,
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message, content: b64(content) })
  });
}

pub.addEventListener("click", async () => {
  const body = ed.value;
  if (!body.trim()){ ed.focus(); return; }
  if (!store.token){ setup.hidden = false; tok.focus(); toast("paste your github token first. one time.", "warn"); return; }

  pub.disabled = true; const label = pub.textContent; pub.textContent = "shipping...";
  const date = keyOf(new Date());
  try {
    let path = `posts/${date}.md`;
    let res  = await putFile(path, body, `post ${date}`);
    if (res.status === 422){ // already posted today — stay create-only (no sha dance), just time-stamp it
      const t = new Date(), p = n => String(n).padStart(2,"0");
      path = `posts/${date}-${p(t.getHours())}${p(t.getMinutes())}${p(t.getSeconds())}.md`;
      res  = await putFile(path, body, `post ${path}`);
    }
    if (!res.ok) throw new Error(res.status);
    const owner = REPO.split("/")[0];
    toast(`live. ${owner}/${path}. you didn't draft it. you shipped it.`, "ok");
    ed.value = ""; render(); ed.focus();
  } catch {
    toast("didn't ship. your words are still in the box. don't close the tab. try again.", "warn");
  } finally {
    pub.disabled = false; pub.textContent = label;
  }
});

// no drafts, on purpose — closing with unpublished words loses them, and says so
window.addEventListener("beforeunload", e => {
  if (ed.value.trim()){ e.preventDefault(); e.returnValue =
    "you have unpublished words. closing = gone. blar doesn't keep drafts on purpose."; }
});

ed.focus(); render();
</script>
</body>
</html>
